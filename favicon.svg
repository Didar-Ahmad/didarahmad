<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <style>
      .da-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 95px; fill: white; text-anchor: middle; dominant-baseline: middle; }
      .da-bg { fill: url(#gradient); }
    </style>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect class="da-bg" width="180" height="180" rx="40"/>
  <text class="da-text" x="90" y="95">DA</text>
</svg>